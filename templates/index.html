<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мониторинг датчиков</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <meta http-equiv="refresh" content="10">
</head>
<body>
    <div class="container">
        <div class="header">
            <div class="header-title">
                <h1>Объекты мониторинга</h1>
                <span class="live-badge"><span class="live-dot"></span>LIVE</span>
            </div>
        </div>

        {% if facilities %}
            <div class="facilities-grid">
                {% for facility in facilities %}
                <a class="facility-card" href="/web/facilities/{{ facility.id }}">
                    <div class="facility-icon">⚡</div>
                    <div>
                        <div class="facility-name">{{ facility.name }}</div>
                        <div class="facility-meta">ID: {{ facility.id }}</div>
                    </div>
                </a>
                {% endfor %}
            </div>
            <div class="actions">
                <a href="/web/active_facilities" class="btn btn-danger">🗑 Очистить неактивные объекты</a>
            </div>
        {% else %}
            <div class="empty-state">
                <div class="empty-icon">📡</div>
                <p>Нет подключённых объектов</p>
            </div>
        {% endif %}
    </div>
</body>
</html>
