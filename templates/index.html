<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Контроль показаний датчиков</title>
    <link rel="stylesheet" href="/static/style.css">
    <meta http-equiv="refresh" content="10">
</head>
<body>
    <h1>Объекты:</h1>
    {% if facilities %}
        <ul>
        {% for facility in facilities %}
            <li>
                <a href="/web/facilities/{{ facility.id }}">{{ facility.name }}</a>
            </li>
        {% endfor %}
        </ul>
        <br>
        <a href="/web/active_facilities">Очистить список объектов</a>
    {% else %}
        <p>Нет подключенных объектов</p>
    {% endif %}
</body>
</html>
